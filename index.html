<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ARM Online</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="login-screen" class="login-screen" aria-modal="true" role="dialog">
        <div class="login-box">
            <h1>Welcome to ARM Online</h1>
            <p>Sign in to continue.</p>
            <form id="login-form">
                <label for="login-user">Username</label>
                <input id="login-user" type="text" placeholder="Username" required>
                <label for="login-pass">Password</label>
                <input id="login-pass" type="password" placeholder="Password" required>
                <button type="submit" class="button">Sign In</button>
            </form>
        </div>
    </div>

    <div class="app-wrapper">
        <header class="top-search-container">
            <img src="img/logo.png" alt="ARM Online" class="app-logo" />
            <input id="song-search" type="search" placeholder="Search song or album..." aria-label="Search songs" class="song-search-input">
            <div id="search-results-panel" class="search-results-panel hidden" aria-live="polite">
                <ul id="search-results-list"></ul>
            </div>
            <span id="user-greeting" class="user-greeting"></span>
            <button id="logout-btn" class="button logout-btn hidden" type="button">Sign Out</button>
        </header>

        <aside class="sidebar">
            <h1 class="logo">Auto Replay Music Online</h1>
            <nav class="album-list">
                <ul id="album-list"></ul>
            </nav>
        </aside>

        <main class="main-content">
            <section id="coverflow-section" class="coverflow-section" aria-label="3D album gallery">
                <div id="coverflow-bg" class="coverflow-background"></div>
                <button id="coverflow-prev" class="coverflow-nav coverflow-nav-prev" aria-label="Previous album">‹</button>
                <div class="coverflow-wrapper">
                    <div id="coverflow-track" class="coverflow-track" role="listbox" aria-label="Albums" tabindex="0"></div>
                </div>
                <button id="coverflow-next" class="coverflow-nav coverflow-nav-next" aria-label="Next album">›</button>
            </section>

            <section id="album-details-panel" class="album-details-panel" aria-live="polite">
                <div class="album-meta">
                    <div class="album-texts">
                        <h2 id="selected-album-title">Select an album</h2>
                        <p id="selected-album-artist" class="subtext">Artist</p>
                        <p id="selected-album-year" class="subtext">Year · Genre · Tracks</p>
                    </div>
                    <button id="btn-play-album" class="button glass-btn" aria-label="Play album">▶ Play album</button>
                </div>
            </section>

            <section class="songs-section">
                <h2 id="songs-title">Songs</h2>
                <p id="album-composer" class="album-composer">Composer: -</p>
                <ul id="songs-list"></ul>
            </section>
        </main>
    </div>

    <div class="player">
        <img id="player-cover" src="" alt="Cover" class="player-cover">
        <div class="player-info">
            <span id="player-song-name">No song selected</span>
            <span id="player-album-name" class="small-text">-</span>
        </div>
        <div class="player-controls">
            <button id="play-pause-btn" class="play-btn" title="Play/Pause">▶</button>
            <button id="prev-btn" class="control-btn" title="Previous">⏮</button>
            <button id="next-btn" class="control-btn" title="Next">⏭</button>
            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <script src="js/audio-service.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
